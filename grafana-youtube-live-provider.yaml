apiVersion: 1
providers:
  - name: YouTube Live Monitor
    orgId: 1
    folder: YouTube Live Monitor
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/youtube-live-monitor
      foldersFromFilesStructure: false
